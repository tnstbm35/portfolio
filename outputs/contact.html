<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Naoya Tsuji</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .contact-wrap {
      min-height: calc(100vh - var(--nav-height));
      padding-top: calc(var(--nav-height) + 100px);
      padding-bottom: 100px;
      max-width: 560px;
      margin: 0 auto;
      padding-left: 40px;
      padding-right: 40px;
    }

    .contact__title {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 300;
      letter-spacing: 0.04em;
      margin-bottom: 48px;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-field label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
    }

    .form-field input,
    .form-field select,
    .form-field textarea {
      width: 100%;
      border: none;
      border-bottom: 1px solid var(--color-border);
      padding: 10px 0;
      font-family: var(--font-primary);
      font-size: 14px;
      font-weight: 300;
      color: var(--color-text);
      background: transparent;
      outline: none;
      transition: border-color var(--transition);
      -webkit-appearance: none;
      border-radius: 0;
    }

    .form-field select {
      cursor: pointer;
      color: var(--color-text);
    }

    .form-field select option[value=""] {
      color: var(--color-muted);
    }

    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus {
      border-bottom-color: var(--color-text);
    }

    .form-field textarea {
      resize: none;
      height: 120px;
      line-height: 1.8;
      border: 1px solid var(--color-border);
      padding: 12px;
    }

    .form-field textarea:focus {
      border-color: var(--color-text);
    }

    .form-submit {
      margin-top: 12px;
    }

    .form-submit button {
      border: 1px solid var(--color-text);
      background: transparent;
      color: var(--color-text);
      padding: 14px 40px;
      font-family: var(--font-primary);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }

    .form-submit button:hover {
      background: var(--color-text);
      color: var(--color-bg);
    }

    .form-success {
      display: none;
      margin-top: 24px;
      font-size: 13px;
      color: var(--color-muted);
      letter-spacing: 0.04em;
    }

    .contact-dm {
      margin-top: 40px;
      padding-top: 64px;
      border-top: 1px solid var(--color-border);
    }

    .contact-dm__text {
      font-size: 13px;
      color: var(--color-muted);
      margin-bottom: 12px;
    }

    .contact-dm__row {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 12px;
    }

    .contact-dm__link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--color-text);
      transition: color var(--transition);
    }

    .contact-dm__link:hover {
      color: var(--color-muted);
    }

    .contact-dm__link svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .contact-dm__link span {
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    @media (max-width: 768px) {
      .contact-wrap {
        padding-left: 20px;
        padding-right: 20px;
      }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav__logo">Naoya Tsuji</a>
    <div class="nav__right">
      <ul class="nav__links">
        <li><a href="works/index.html">Works</a></li>
        <li><a href="showcase/index.html">Showcase</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </div>
    <button class="nav__hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobile-menu">
    <ul class="mobile-menu__links">
      <li><a href="works/index.html">Works</a></li>
      <li><a href="showcase/index.html">Showcase</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </div>

  <main class="contact-wrap page-fade">
    <h1 class="contact__title">Contact</h1>

    <form
      class="contact-form"
      id="contact-form"
      action="https://formspree.io/f/YOUR_FORM_ID"
      method="POST"
    >
      <div class="form-field">
        <label for="name">お名前 / Name</label>
        <input type="text" id="name" name="name" placeholder="Naoya Tsuji" required />
      </div>

      <div class="form-field">
        <label for="email">メールアドレス / Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required />
      </div>

      <div class="form-field">
        <label for="type">お問い合わせ種別 / Type</label>
        <select id="type" name="type" required>
          <option value="" disabled selected>選択してください / Please select</option>
          <option value="撮影依頼">撮影依頼 / Filming Inquiry</option>
          <option value="Showcaseパスワード希望">Showcaseパスワード希望 / Showcase Password</option>
          <option value="その他">その他 / Other</option>
        </select>
      </div>

      <div class="form-field">
        <label for="message">メッセージ / Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>

      <div class="form-submit">
        <button type="submit">Send</button>
      </div>
    </form>

    <p class="form-success" id="form-success">送信が完了しました。ありがとうございます。</p>

    <div class="contact-dm">
      <div class="contact-dm__row">
        <p class="contact-dm__text">InstagramのDMからもお気軽にどうぞ。</p>
        <a href="https://www.instagram.com/naoyatsuji_/" target="_blank" rel="noopener" class="contact-dm__link">

          <span>@naoyatsuji_</span>
        </a>
      </div>
      <div class="contact-dm__row">
        <p class="contact-dm__text">婚礼のご依頼はこちらへ。</p>
        <a href="https://www.instagram.com/profonde.film/" target="_blank" rel="noopener" class="contact-dm__link">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
          <span>profonde</span>
        </a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p class="footer__copy">© 2026 Naoya Tsuji. All rights reserved.</p>
    <span class="footer__top">Back to Top ↑</span>
  </footer>

  <script src="js/main.js"></script>
  <script>
    const form = document.getElementById('contact-form');
    const success = document.getElementById('form-success');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        form.style.display = 'none';
        success.style.display = 'block';
      }
    });
  </script>
</body>
</html>
